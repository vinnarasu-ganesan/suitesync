{% extends "base.html" %}

{% block title %}Tests - SuiteSync{% endblock %}

{% block content %}
<div class="row">
    <div class="col-12">
        <h1 class="mb-4">
            <i class="bi bi-list-check"></i> Tests
        </h1>
    </div>
</div>

<div class="row mb-3">
    <div class="col-md-3">
        <input type="text" class="form-control" id="search-input" placeholder="Search tests...">
    </div>
    <div class="col-md-2">
        <select class="form-select" id="status-filter">
            <option value="active">Active</option>
            <option value="archived">Archived</option>
            <option value="">All</option>
        </select>
    </div>
    <div class="col-md-2">
        <select class="form-select" id="marker-filter">
            <option value="">All Markers</option>
        </select>
    </div>
    <div class="col-md-2">
        <select class="form-select" id="testrail-filter">
            <option value="">All Tests</option>
            <option value="with">With TestRail ID</option>
            <option value="without">Without TestRail ID</option>
            <option value="deleted">Deleted TestRail ID</option>
        </select>
    </div>
    <div class="col-md-3">
        <button class="btn btn-primary w-100" id="validate-btn">
            <i class="bi bi-check-circle"></i> Validate TestRail IDs
        </button>
    </div>
</div>

<div class="row">
    <div class="col-12">
        <div class="card">
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-hover">
                        <thead>
                            <tr>
                                <th>TestRail ID</th>
                                <th>TestRail Status</th>
                                <th>Test Name</th>
                                <th>File</th>
                                <th>Markers</th>
                                <th>Status</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="tests-tbody">
                            <tr>
                                <td colspan="7" class="text-center">
                                    <div class="spinner-border text-primary" role="status">
                                        <span class="visually-hidden">Loading...</span>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
                <nav aria-label="Test pagination">
                    <ul class="pagination justify-content-center" id="pagination">
                    </ul>
                </nav>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script src="{{ url_for('static', filename='js/tests.js') }}"></script>
{% endblock %}
