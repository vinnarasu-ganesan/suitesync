<!DOCTYPE html>
<html>
<head>
    <title>TestRail Performance Test</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { padding: 20px; }
        .result { margin: 10px 0; padding: 10px; border: 1px solid #ccc; }
        .fast { background-color: #d4edda; }
        .slow { background-color: #f8d7da; }
        .medium { background-color: #fff3cd; }
    </style>
</head>
<body>
    <div class="container">
        <h1>TestRail Page Performance Diagnostic</h1>
        <p>This page tests the performance of the TestRail API and rendering.</p>

        <button class="btn btn-primary" onclick="runTests()">Run Performance Tests</button>
        <button class="btn btn-secondary" onclick="clearResults()">Clear Results</button>

        <div id="results" class="mt-4"></div>
    </div>

    <script>
        function log(message, className = '') {
            const resultsDiv = document.getElementById('results');
            const resultEntry = document.createElement('div');
            resultEntry.className = `result ${className}`;
            resultEntry.textContent = message;
            resultsDiv.appendChild(resultEntry);
            console.log(message);
        }

        function clearResults() {
            document.getElementById('results').innerHTML = '';
        }

        async function runTests() {
            clearResults();
            log('=== Starting Performance Tests ===');

            // Test 1: API Response Time
            log('\n1. Testing API Response Time...');
            const apiStart = performance.now();
            try {
                const response = await fetch('/api/testrail/cases?page=1&per_page=20');
                const apiEnd = performance.now();
                const apiTime = apiEnd - apiStart;

                const data = await response.json();
                const parseEnd = performance.now();
                const parseTime = parseEnd - apiEnd;

                const className = apiTime < 500 ? 'fast' : apiTime < 2000 ? 'medium' : 'slow';
                log(`✓ API Response: ${apiTime.toFixed(2)}ms`, className);
                log(`  - JSON Parse: ${parseTime.toFixed(2)}ms`);
                log(`  - Returned ${data.cases.length} cases`);
                log(`  - Payload size: ${JSON.stringify(data).length} bytes`);
            } catch (error) {
                log(`✗ API Error: ${error.message}`, 'slow');
            }

            // Test 2: Network Timing (if available)
            log('\n2. Network Timing Details...');
            if (window.performance && window.performance.getEntriesByType) {
                const entries = window.performance.getEntriesByType('resource');
                const apiEntry = entries.find(e => e.name.includes('/api/testrail/cases'));
                if (apiEntry) {
                    log(`  - DNS Lookup: ${(apiEntry.domainLookupEnd - apiEntry.domainLookupStart).toFixed(2)}ms`);
                    log(`  - TCP Connect: ${(apiEntry.connectEnd - apiEntry.connectStart).toFixed(2)}ms`);
                    log(`  - Request Time: ${(apiEntry.responseStart - apiEntry.requestStart).toFixed(2)}ms`);
                    log(`  - Response Time: ${(apiEntry.responseEnd - apiEntry.responseStart).toFixed(2)}ms`);
                    log(`  - Total Duration: ${apiEntry.duration.toFixed(2)}ms`);
                }
            }

            // Test 3: HTML Generation
            log('\n3. Testing HTML Generation...');
            try {
                const response = await fetch('/api/testrail/cases?page=1&per_page=20');
                const data = await response.json();

                const htmlStart = performance.now();
                const html = data.cases.map(testCase => `
                    <tr>
                        <td>${testCase.case_id}</td>
                        <td>${testCase.title}</td>
                        <td>${testCase.suite_id || 'N/A'}</td>
                        <td>${testCase.section_id || 'N/A'}</td>
                        <td>${testCase.type_id || 'N/A'}</td>
                        <td>${testCase.priority_id || 'N/A'}</td>
                        <td>${testCase.updated_at || 'N/A'}</td>
                    </tr>
                `).join('');
                const htmlEnd = performance.now();
                const htmlTime = htmlEnd - htmlStart;

                const className = htmlTime < 100 ? 'fast' : htmlTime < 500 ? 'medium' : 'slow';
                log(`✓ HTML Generation: ${htmlTime.toFixed(2)}ms`, className);
                log(`  - Generated HTML size: ${html.length} chars`);
            } catch (error) {
                log(`✗ HTML Generation Error: ${error.message}`, 'slow');
            }

            // Test 4: DOM Rendering
            log('\n4. Testing DOM Rendering...');
            try {
                const response = await fetch('/api/testrail/cases?page=1&per_page=20');
                const data = await response.json();

                const testTable = document.createElement('table');
                testTable.style.display = 'none';
                document.body.appendChild(testTable);

                const html = data.cases.map(testCase => `
                    <tr>
                        <td>${testCase.case_id}</td>
                        <td>${testCase.title}</td>
                        <td>${testCase.suite_id || 'N/A'}</td>
                        <td>${testCase.section_id || 'N/A'}</td>
                        <td>${testCase.type_id || 'N/A'}</td>
                        <td>${testCase.priority_id || 'N/A'}</td>
                        <td>${testCase.updated_at || 'N/A'}</td>
                    </tr>
                `).join('');

                const renderStart = performance.now();
                testTable.innerHTML = html;
                const renderEnd = performance.now();
                const renderTime = renderEnd - renderStart;

                document.body.removeChild(testTable);

                const className = renderTime < 100 ? 'fast' : renderTime < 500 ? 'medium' : 'slow';
                log(`✓ DOM Rendering: ${renderTime.toFixed(2)}ms`, className);
            } catch (error) {
                log(`✗ DOM Rendering Error: ${error.message}`, 'slow');
            }

            // Test 5: Full Page Load Simulation
            log('\n5. Testing Full Page Load Simulation...');
            try {
                const fullStart = performance.now();

                const response = await fetch('/api/testrail/cases?page=1&per_page=20');
                const data = await response.json();

                const html = data.cases.map(testCase => `
                    <tr>
                        <td>${testCase.case_id}</td>
                        <td>${testCase.title}</td>
                        <td>${testCase.suite_id || 'N/A'}</td>
                        <td>${testCase.section_id || 'N/A'}</td>
                        <td>${testCase.type_id || 'N/A'}</td>
                        <td>${testCase.priority_id || 'N/A'}</td>
                        <td>${testCase.updated_at || 'N/A'}</td>
                    </tr>
                `).join('');

                const testTable = document.createElement('table');
                testTable.style.display = 'none';
                document.body.appendChild(testTable);
                testTable.innerHTML = html;
                document.body.removeChild(testTable);

                const fullEnd = performance.now();
                const fullTime = fullEnd - fullStart;

                const className = fullTime < 1000 ? 'fast' : fullTime < 3000 ? 'medium' : 'slow';
                log(`✓ Full Load Time: ${fullTime.toFixed(2)}ms`, className);
            } catch (error) {
                log(`✗ Full Load Error: ${error.message}`, 'slow');
            }

            log('\n=== Tests Complete ===');
            log('\nPerformance Guide:');
            log('  - Fast (Green): < 500ms for API, < 100ms for rendering');
            log('  - Medium (Yellow): 500-2000ms for API, 100-500ms for rendering');
            log('  - Slow (Red): > 2000ms for API, > 500ms for rendering');
        }
    </script>
</body>
</html>
