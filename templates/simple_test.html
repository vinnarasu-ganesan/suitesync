<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SuiteSync - Simple Test</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <h1>SuiteSync - Simple Test Page</h1>

        <div class="alert alert-info" id="status">
            Testing...
        </div>

        <div class="card mt-3">
            <div class="card-header">
                <h3>Test Statistics</h3>
            </div>
            <div class="card-body">
                <p><strong>Total Tests:</strong> <span id="total-tests">Loading...</span></p>
                <p><strong>With TestRail:</strong> <span id="with-testrail">Loading...</span></p>
                <p><strong>Without TestRail:</strong> <span id="without-testrail">Loading...</span></p>
            </div>
        </div>

        <div class="card mt-3">
            <div class="card-header">
                <h3>Recent Tests</h3>
            </div>
            <div class="card-body">
                <ul id="test-list">
                    <li>Loading...</li>
                </ul>
            </div>
        </div>

        <div class="card mt-3">
            <div class="card-header">
                <h3>Console Output</h3>
            </div>
            <div class="card-body">
                <pre id="console" style="background: #f5f5f5; padding: 10px; max-height: 300px; overflow-y: scroll;"></pre>
            </div>
        </div>
    </div>

    <script>
        // Override console.log to show in page
        const consoleDiv = document.getElementById('console');
        const originalLog = console.log;
        const originalError = console.error;

        function logToPage(type, ...args) {
            const msg = args.map(a => typeof a === 'object' ? JSON.stringify(a, null, 2) : String(a)).join(' ');
            consoleDiv.textContent += `[${type}] ${msg}\n`;
            consoleDiv.scrollTop = consoleDiv.scrollHeight;
        }

        console.log = function(...args) {
            originalLog.apply(console, args);
            logToPage('LOG', ...args);
        };

        console.error = function(...args) {
            originalError.apply(console, args);
            logToPage('ERROR', ...args);
        };

        console.log('JavaScript is running!');
        console.log('Starting API tests...');

        document.getElementById('status').textContent = 'JavaScript loaded successfully!';
        document.getElementById('status').className = 'alert alert-success';

        // Test 1: Stats API
        console.log('Fetching stats...');
        fetch('/api/tests/stats')
            .then(response => {
                console.log('Stats response status:', response.status);
                return response.json();
            })
            .then(data => {
                console.log('Stats data received:', data);
                document.getElementById('total-tests').textContent = data.total_tests;
                document.getElementById('with-testrail').textContent = data.tests_with_testrail;
                document.getElementById('without-testrail').textContent = data.tests_without_testrail;
            })
            .catch(error => {
                console.error('Stats error:', error);
                document.getElementById('total-tests').textContent = 'ERROR: ' + error.message;
            });

        // Test 2: Tests API
        console.log('Fetching tests...');
        fetch('/api/tests?per_page=5')
            .then(response => {
                console.log('Tests response status:', response.status);
                return response.json();
            })
            .then(data => {
                console.log('Tests data received, count:', data.tests.length);
                const list = document.getElementById('test-list');
                list.innerHTML = '';
                data.tests.forEach(test => {
                    const li = document.createElement('li');
                    li.textContent = test.test_name;
                    list.appendChild(li);
                });
            })
            .catch(error => {
                console.error('Tests error:', error);
                document.getElementById('test-list').innerHTML = '<li>ERROR: ' + error.message + '</li>';
            });

        console.log('All fetch requests initiated');
    </script>
</body>
</html>
