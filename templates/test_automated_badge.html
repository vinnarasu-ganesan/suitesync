<!DOCTYPE html>
<html>
<head>
    <title>Test Automated Badge Function</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .test-case { margin: 10px 0; padding: 10px; border: 1px solid #ccc; }
        .result { margin-left: 20px; }
        .badge { padding: 5px 10px; border-radius: 4px; color: white; }
        .bg-success { background-color: #28a745; }
        .bg-secondary { background-color: #6c757d; }
    </style>
</head>
<body>
    <h1>Automated Badge Function - Test Page</h1>
    <p>This page tests the getAutomatedBadge function with various inputs.</p>

    <div id="test-results"></div>

    <script>
        // Copy of the getAutomatedBadge function from testrail.js
        function getAutomatedBadge(customFields) {
            if (!customFields) {
                return '<span class="badge bg-secondary">✗ No</span>';
            }

            const automationType = customFields.custom_automation_type;
            const automationStatus = customFields.custom_preconds;
            const isAutomated = customFields.custom_is_automated;

            if (automationType !== undefined && automationType !== null && automationType !== 0) {
                return '<span class="badge bg-success">✓ Yes</span>';
            }

            if (isAutomated === true || isAutomated === 1 || isAutomated === '1') {
                return '<span class="badge bg-success">✓ Yes</span>';
            }

            if (automationStatus && typeof automationStatus === 'string') {
                const lowerStatus = automationStatus.toLowerCase();
                if (lowerStatus.includes('automat') || lowerStatus.includes('yes')) {
                    return '<span class="badge bg-success">✓ Yes</span>';
                }
            }

            for (const [key, value] of Object.entries(customFields)) {
                const lowerKey = key.toLowerCase();
                if (lowerKey.includes('automat') || lowerKey.includes('automated')) {
                    if (value === true || value === 1 || value === '1' ||
                        (typeof value === 'string' && value.toLowerCase().includes('yes'))) {
                        return '<span class="badge bg-success">✓ Yes</span>';
                    }
                    if (typeof value === 'number' && value > 0) {
                        return '<span class="badge bg-success">✓ Yes</span>';
                    }
                }
            }

            return '<span class="badge bg-secondary">✗ No</span>';
        }

        // Test cases
        const testCases = [
            {
                name: "Null custom fields",
                input: null,
                expected: "No"
            },
            {
                name: "Empty custom fields",
                input: {},
                expected: "No"
            },
            {
                name: "Automation type = 0 (None)",
                input: { custom_automation_type: 0 },
                expected: "No"
            },
            {
                name: "Automation type = 1 (Ranorex)",
                input: { custom_automation_type: 1 },
                expected: "Yes"
            },
            {
                name: "Automation type = 2 (Selenium)",
                input: { custom_automation_type: 2 },
                expected: "Yes"
            },
            {
                name: "is_automated = true",
                input: { custom_is_automated: true },
                expected: "Yes"
            },
            {
                name: "is_automated = 1",
                input: { custom_is_automated: 1 },
                expected: "Yes"
            },
            {
                name: "is_automated = false",
                input: { custom_is_automated: false },
                expected: "No"
            },
            {
                name: "Automation status = 'Automated'",
                input: { custom_preconds: "Automated with Selenium" },
                expected: "Yes"
            },
            {
                name: "Automation status = 'Manual'",
                input: { custom_preconds: "Manual testing required" },
                expected: "No"
            },
            {
                name: "Custom field with 'automated' in name = yes",
                input: { custom_my_automated_field: "yes" },
                expected: "Yes"
            },
            {
                name: "Custom field with 'automation' in name = 1",
                input: { custom_automation_status: 1 },
                expected: "Yes"
            },
            {
                name: "Random custom fields, no automation",
                input: { custom_steps: "Step 1", custom_expected: "Result" },
                expected: "No"
            }
        ];

        // Run tests
        const resultsDiv = document.getElementById('test-results');
        let passCount = 0;
        let failCount = 0;

        testCases.forEach((test, index) => {
            const result = getAutomatedBadge(test.input);
            const isPass = result.includes(test.expected);

            if (isPass) passCount++;
            else failCount++;

            const testDiv = document.createElement('div');
            testDiv.className = 'test-case';
            testDiv.innerHTML = `
                <strong>Test ${index + 1}: ${test.name}</strong>
                <span style="color: ${isPass ? 'green' : 'red'}">${isPass ? '✓ PASS' : '✗ FAIL'}</span>
                <div class="result">
                    <strong>Input:</strong> ${JSON.stringify(test.input)}<br>
                    <strong>Expected:</strong> ${test.expected}<br>
                    <strong>Got:</strong> ${result}
                </div>
            `;
            resultsDiv.appendChild(testDiv);
        });

        // Summary
        const summary = document.createElement('div');
        summary.style.marginTop = '20px';
        summary.style.padding = '15px';
        summary.style.backgroundColor = passCount === testCases.length ? '#d4edda' : '#f8d7da';
        summary.style.border = '1px solid ' + (passCount === testCases.length ? '#c3e6cb' : '#f5c6cb');
        summary.innerHTML = `
            <h3>Test Summary</h3>
            <p><strong>Total Tests:</strong> ${testCases.length}</p>
            <p><strong>Passed:</strong> ${passCount}</p>
            <p><strong>Failed:</strong> ${failCount}</p>
            <p><strong>Success Rate:</strong> ${Math.round(passCount / testCases.length * 100)}%</p>
        `;
        resultsDiv.insertBefore(summary, resultsDiv.firstChild);
    </script>
</body>
</html>
